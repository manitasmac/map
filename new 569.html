<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>TASMAC SHOP LOCATOR</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 88vh;
            border-radius: 10px;
        }

        .sidebar {
            max-height: 88vh;
            overflow: auto;
        }

        .card {
            box-shadow: 0 3px 12px rgba(0, 0, 0, .15);
            border: none;
        }

        .form-control,
        .form-select {
            margin-bottom: 10px;
        }

        h3 {
            font-weight: 700;
            color: #0d6efd;
        }

        table {
            font-size: 12px;
        }

        #toggleMenu {
            width: 100%;
            margin-bottom: 10px;
        }

        /* Styling for the permanent shop number labels above markers */
        .shop-label {
            background: rgba(13, 110, 253, 0.9);
            color: #fff;
            border: 1px solid #0046b3;
            border-radius: 4px;
            padding: 2px 6px;
            font-weight: bold;
            font-size: 11px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <div class="container-fluid p-3">
        <h3 class="text-center mb-3">TASMAC SHOP LOCATOR</h3>
        <button id="toggleMenu" class="btn btn-primary">☰ Hide Control Menu</button>

        <div class="row">
            <div class="col-md-4 sidebar" id="sidebarPanel">
                <div class="card p-3">
                    <label class="form-label font-monospace small">Upload CSV</label>
                    <input type="file" id="csvFile" class="form-control" accept=".csv">

                    <label class="form-label font-monospace small">Upload KML Boundaries</label>
                    <input type="file" id="kmlFile" class="form-control" accept=".kml">

                    <select id="srmFilter" class="form-select">
                        <option value="">ALL SRM</option>
                    </select>

                    <select id="dmFilter" class="form-select">
                        <option value="">ALL DM</option>
                    </select>

                    <select id="districtFilter" class="form-select">
                        <option value="">ALL DISTRICT</option>
                    </select>

                    <select id="talukFilter" class="form-select">
                        <option value="">ALL TALUK</option>
                    </select>

                    <select id="shopFilter" class="form-select">
                        <option value="">ALL SHOPS</option>
                    </select>

                    <input type="text" id="shopSearch" class="form-control" placeholder="Search Shop No / Address">

                    <table id="shopTable" class="table table-bordered table-sm">
                        <thead class="table-primary">
                            <tr>
                                <th>S.No</th>
                                <th>Shop No</th>
                                <th>Taluk</th>
                                <th>DM Name</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-8" id="mapPanel">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

    <script>
        let shops = [];
        let talukLayer = null;
        let highlightLayer = null;

        const map = L.map('map').setView([11.1271, 78.6569], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let cluster = L.markerClusterGroup();
        map.addLayer(cluster);

        const table = $("#shopTable").DataTable({
            pageLength: 10,
            lengthMenu: [
                [10, 25, 50, 100, -1],
                [10, 25, 50, 100, "ALL"]
            ],
            columnDefs: [
                { "searchable": false, "orderable": false, "targets": 0 }
            ],
            order: [[1, 'asc']]
        });

        // Toggle Control Menu
        $("#toggleMenu").on('click', function() {
            const sidebar = $("#sidebarPanel");
            const mapPanel = $("#mapPanel");
            if (sidebar.is(":visible")) {
                sidebar.hide();
                mapPanel.removeClass("col-md-8").addClass("col-md-12");
                $(this).text("☰ Unhide Control Menu");
            } else {
                sidebar.show();
                mapPanel.removeClass("col-md-12").addClass("col-md-8");
                $(this).text("☰ Hide Control Menu");
            }
            setTimeout(() => { map.invalidateSize(); }, 200);
        });

        function fill(id, values, title) {
            const el = $(id);
            const currentVal = el.val();
            el.html(`<option value="">${title}</option>`);

            [...new Set(values.filter(Boolean))].sort().forEach(v => {
                el.append(`<option value="${v}">${v}</option>`);
            });

            if (values.includes(currentVal)) {
                el.val(currentVal);
            }
        }

        function loadSRM() {
            fill('#srmFilter', shops.map(x => x.srm), 'ALL SRM');
        }

        function loadDM() {
            let srm = $("#srmFilter").val();
            let data = shops.filter(x => !srm || x.srm === srm).map(x => x.dm);
            fill('#dmFilter', data, 'ALL DM');
        }

        function loadDistrict() {
            let srm = $("#srmFilter").val();
            let dm = $("#dmFilter").val();
            let data = shops.filter(x => (!srm || x.srm === srm) && (!dm || x.dm === dm)).map(x => x.district);
            fill('#districtFilter', data, 'ALL DISTRICT');
        }

        function loadTaluk() {
            let srm = $("#srmFilter").val();
            let dm = $("#dmFilter").val();
            let district = $("#districtFilter").val();
            let data = shops.filter(x => 
                (!srm || x.srm === srm) && 
                (!dm || x.dm === dm) && 
                (!district || x.district === district)
            ).map(x => x.taluk);
            fill('#talukFilter', data, 'ALL TALUK');
        }

        function loadShop() {
            let srm = $("#srmFilter").val();
            let dm = $("#dmFilter").val();
            let district = $("#districtFilter").val();
            let taluk = $("#talukFilter").val();
            let data = shops.filter(x => 
                (!srm || x.srm === srm) && 
                (!dm || x.dm === dm) && 
                (!district || x.district === district) && 
                (!taluk || x.taluk === taluk)
            ).map(x => x.shopNo);
            fill('#shopFilter', data, 'ALL SHOPS');
        }

        $("#csvFile").on('change', function(e) {
            if (!e.target.files[0]) return;
            Papa.parse(e.target.files[0], {
                header: true,
                skipEmptyLines: true,
                complete: function(r) {
                    shops = r.data.map(row => ({
                        srm: row["SRM NAME"] || "",
                        dm: row["DM NAME"] || "",
                        shopNo: String(row["Shop No"] || ""),
                        address: row["Shop Address"] || "",
                        district: row["Revenue District"] || "",
                        taluk: row["Name Of The Taluk"] || "",
                        lat: parseFloat(row["Latitude"]),
                        lng: parseFloat(row["Longitude"])
                    })).filter(x => !isNaN(x.lat) && !isNaN(x.lng));

                    loadSRM();
                    loadDM();
                    loadDistrict();
                    loadTaluk();
                    loadShop();

                    render();
                    highlightTaluk();
                    alert(`Loaded ${shops.length} Shops`);
                }
            });
        });

        function render() {
            table.clear();
            cluster.clearLayers();

            let txt = $("#shopSearch").val().toLowerCase();
            let data = shops.filter(x => 
                (!$("#srmFilter").val() || x.srm === $("#srmFilter").val()) &&
                (!$("#dmFilter").val() || x.dm === $("#dmFilter").val()) &&
                (!$("#districtFilter").val() || x.district === $("#districtFilter").val()) &&
                (!$("#talukFilter").val() || x.taluk === $("#talukFilter").val()) &&
                (!$("#shopFilter").val() || x.shopNo === $("#shopFilter").val()) &&
                (!txt || x.shopNo.toLowerCase().includes(txt) || x.address.toLowerCase().includes(txt))
            );

            let bounds = [];
            let serialCount = 1;

            data.forEach(s => {
                table.row.add([serialCount++, s.shopNo, s.taluk, s.dm]);

                const marker = L.marker([s.lat, s.lng]).bindPopup(`
                    <div style="font-size: 14px; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 5px;">
                        <b>SHOP NO: ${s.shopNo}</b>
                    </div>
                    <div style="margin-top: 5px; line-height: 1.4;">
                        <b>SRM:</b> ${s.srm}<br>
                        <b>DM:</b> ${s.dm}<br>
                        <b>District:</b> ${s.district}<br>
                        <b>Taluk:</b> ${s.taluk}<br>
                        <b>Address:</b> ${s.address}
                    </div>
                `);

                // Attaches a permanent label displaying the Shop Number directly on top of/above the marker
                marker.bindTooltip(`No: ${s.shopNo}`, {
                    permanent: true,
                    direction: 'top',
                    className: 'shop-label',
                    offset: [0, -10]
                });

                cluster.addLayer(marker);
                bounds.push([s.lat, s.lng]);
            });

            table.draw();

            // Zoom in automatically to fit all filtered shops securely on screen
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
            }
        }

        // Filters UI updates
        $("#srmFilter").on('change', function() {
            loadDM();
            loadDistrict();
            loadTaluk();
            loadShop();
            render();
            highlightTaluk();
        });

        $("#dmFilter").on('change', function() {
            loadDistrict();
            loadTaluk();
            loadShop();
            render();
            highlightTaluk();
        });

        $("#districtFilter").on('change', function() {
            loadTaluk();
            loadShop();
            render();
            highlightTaluk();
        });

        $("#talukFilter").on('change', function() {
            loadShop();
            render();
            highlightTaluk();
        });

        $("#shopFilter").on('change', function() {
            render();
            highlightTaluk();
        });

        $("#shopSearch").on('keyup', render);

        // Map spatial loading elements
        $("#kmlFile").on('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                if (talukLayer) {
                    map.removeLayer(talukLayer);
                }
                talukLayer = omnivore.kml.parse(ev.target.result);
                talukLayer.addTo(map);
                
                talukLayer.on('ready', function() {
                    map.fitBounds(talukLayer.getBounds());
                    highlightTaluk();
                });
            };
            reader.readAsText(file);
        });// Ensure a persistent layer group is available for the boundary and label tracking
if (typeof highlightGroup === 'undefined') {
    var highlightGroup = L.layerGroup().addTo(map);
}

function highlightTaluk() {
    // 1. Instantly clear old boundaries and labels
    highlightGroup.clearLayers();

    if (!talukLayer) return;

    let selectedTaluk = $("#talukFilter").val().toLowerCase().trim();
    if (!selectedTaluk) return;

    let boundsToFit = [];

    talukLayer.eachLayer(function(layer) {
        let props = layer.feature?.properties || {};
        let matched = false;
        let originalTalukName = "";

        for (let key in props) {
            let keyLower = key.toLowerCase().trim();
            let valueStr = String(props[key] || "").toLowerCase().trim();

            // CRITICAL FIX: Skip 'dist_name', 'district', or any district-level headers completely
            if (keyLower === 'dist_name' || keyLower.includes('dist') || keyLower.includes('dt_name')) {
                continue; 
            }

            // Target the actual Taluk identifiers exclusively
            if (keyLower.includes('taluk') || keyLower.includes('name') || keyLower.includes('tehsil')) {
                if (valueStr === selectedTaluk || valueStr.startsWith(selectedTaluk + " ")) {
                    matched = true;
                    originalTalukName = String(props[key]);
                    break;
                }
            }
        }

        // Final strict safety fallback: cross-check remaining fields using an exact text match
        if (!matched) {
            for (let key in props) {
                let keyLower = key.toLowerCase().trim();
                if (keyLower === 'dist_name' || keyLower.includes('dist')) continue;

                let valueStr = String(props[key] || "").toLowerCase().trim();
                if (valueStr === selectedTaluk) {
                    matched = true;
                    originalTalukName = String(props[key]);
                    break;
                }
            }
        }

        if (matched) {
            // 2. Render targeted polygon layer boundary
            let currentHighlight = L.geoJSON(layer.toGeoJSON(), {
                style: {
                    color: 'red',
                    weight: 4,
                    fillColor: 'yellow',
                    fillOpacity: 0.35
                }
            });

            highlightGroup.addLayer(currentHighlight);
            boundsToFit.push(currentHighlight.getBounds());

            // 3. Pin down the center coordinates for the text area badge
            let center = currentHighlight.getBounds().getCenter();

            let talukLabel = L.marker(center, {
                icon: L.divIcon({
                    className: 'taluk-area-label',
                    html: `<div style="
                        background: rgba(255, 255, 255, 0.9);
                        color: #d63031;
                        border: 2px solid red;
                        border-radius: 5px;
                        padding: 4px 8px;
                        font-weight: bold;
                        font-size: 13px;
                        white-space: nowrap;
                        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
                        text-align: center;
                        transform: translate(-50%, -50%);
                    ">${originalTalukName.toUpperCase()}</div>`,
                    iconSize: null
                })
            });

            highlightGroup.addLayer(talukLabel);
        }
    });

    // 4. Center map view strictly onto the isolated taluk area
    if (boundsToFit.length > 0) {
        let featureBounds = L.latLngBounds(boundsToFit);
        map.fitBounds(featureBounds, { padding: [40, 40] });
    }
}
    </script>
</body>
</html>
